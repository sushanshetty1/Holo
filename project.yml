name: Holo
options:
  bundleIdPrefix: com.holo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  HoloCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/HoloCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holo.HoloCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
  Holo:
    type: application
    platform: macOS
    sources:
      - path: Sources/HoloApp
    info:
      path: Config/Holo-Info.plist
      properties:
        CFBundleDisplayName: Holo
        CFBundleName: Holo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSMultipleInstancesProhibited: true
        NSMicrophoneUsageDescription: Holo listens for desk taps locally. Audio is discarded unless you explicitly enable debug recording.
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    entitlements:
      path: Config/Holo.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    dependencies:
      - target: HoloCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holo.app
        PRODUCT_NAME: Holo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: J7ZMYXJVRR
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
  HoloCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/HoloCoreTests
    dependencies:
      - target: HoloCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holo.HoloCoreTests
        GENERATE_INFOPLIST_FILE: YES
  HoloSoak:
    type: tool
    platform: macOS
    sources:
      - path: Sources/HoloSoak
    dependencies:
      - target: HoloCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holo.HoloSoak
        GENERATE_INFOPLIST_FILE: YES
  HoloRouteCheck:
    type: tool
    platform: macOS
    sources:
      - path: Sources/HoloRouteCheck
      - path: Sources/HoloApp/SystemAudioRoute.swift
    dependencies:
      - target: HoloCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holo.HoloRouteCheck
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Holo:
    build:
      targets:
        Holo: all
        HoloCore: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HoloCoreTests
  HoloSoak:
    build:
      targets:
        HoloSoak: all
    run:
      config: Release
  HoloRouteCheck:
    build:
      targets:
        HoloRouteCheck: all
    run:
      config: Debug
