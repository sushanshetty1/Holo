name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test HoloCore
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
